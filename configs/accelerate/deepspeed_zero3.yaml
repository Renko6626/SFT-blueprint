compute_environment: LOCAL_MACHINE
debug: false
distributed_type: DEEPSPEED
deepspeed_config:
  gradient_accumulation_steps: auto
  gradient_clipping: auto
  offload_optimizer_device: none
  offload_param_device: none
  zero3_init_flag: true
  zero3_save_16bit_model: true
  zero_stage: 3
mixed_precision: bf16
num_machines: 1
# num_processes is overridden by --num_processes in the launch command.
# Set this to your actual GPU count if you run accelerate launch without --num_processes.
num_processes: 6
rdzv_backend: static
same_network: true
use_cpu: false
